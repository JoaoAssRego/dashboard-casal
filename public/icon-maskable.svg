<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradiente Fundo OLED com um toque sutil de roxo escuro no topo -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F0C16" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>

    <!-- Gradiente Azul Marinho (Segurança/Base) -->
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </linearGradient>

    <!-- Gradiente Roxo para Rosa (Ação/Gamificação) -->
    <linearGradient id="pinkPurple" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#863BFF" />
      <stop offset="100%" stop-color="#FF3B86" />
    </linearGradient>

    <!-- Sombra para criar o efeito de sobreposição e profundidade -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="-10" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Fundo Maskable PWA (Totalmente Quadrado, preenche todo o espaço) -->
  <rect width="512" height="512" fill="url(#bg)" />

  <!-- Forma Esquerda/Baixo (Parceiro 1 / Base / Segurança) -->
  <rect x="100" y="211" width="176" height="176" rx="56" transform="rotate(45, 188, 299)" fill="url(#navy)" />

  <!-- Forma Direita/Cima (Parceiro 2 / Vibração / Metas) -->
  <rect x="236" y="125" width="176" height="176" rx="56" transform="rotate(45, 324, 213)" fill="url(#pinkPurple)" filter="url(#shadow)" />
</svg>
